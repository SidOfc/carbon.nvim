name: CI
on:
  push:
    branches:
      - 'master'
  pull_request:
    branches:
      - 'master'
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          LUALS_VERSION=3.18.2
          LUALS_RELEASE_URL=https://github.com/LuaLS/lua-language-server/releases/download/${LUALS_VERSION}/lua-language-server-${LUALS_VERSION}-linux-x64.tar.gz
          LUALS_INSTALL_PATH=$HOME/.local/lua-language-server

          sudo add-apt-repository ppa:neovim-ppa/unstable
          sudo apt update
          sudo apt install -y lua-check neovim
          curl -L -o lua-language-server.tar.gz $LUALS_RELEASE_URL
          mkdir -p $LUALS_INSTALL_PATH
          tar -xzf lua-language-server.tar.gz -C $LUALS_INSTALL_PATH
          echo "$LUALS_INSTALL_PATH/bin" >> $GITHUB_PATH

      - name: Lint
        run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo add-apt-repository ppa:neovim-ppa/unstable
          sudo apt update
          sudo apt install -y neovim

      - name: Test
        run: make test

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: JohnnyMorganz/stylua-action@1.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 0.14.2
          args: lua --check
